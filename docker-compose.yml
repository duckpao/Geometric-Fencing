version: '3.8'
services:
  # Redis: Dùng bản alpine cho nhẹ và ổn định
  redis:
    image: redis:7.0-alpine
    container_name: redis-tracking
    ports:
      - "6379:6379"

  # Zookeeper: Dùng bản của Confluent (rất phổ biến)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper-tracking
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # Kafka: Dùng bản của Confluent để đồng bộ với Zookeeper
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka-tracking
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1