version: '3.8'
services:
  # Database chính: MySQL
  mysql:
    image: mysql:8.0
    container_name: mysql-tracking
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: tracking_db
      MYSQL_ROOT_PASSWORD: "1234"  # Mật khẩu root bạn chọn
    volumes:
      - mysql_data:/var/lib/mysql
      # Redis: Tính toán địa lý
  redis:
    image: redis:7.0-alpine
    container_name: redis-tracking
    ports:
      - "6379:6379"

  # Zookeeper & Kafka (Giữ nguyên như bản trước)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper-tracking
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka-tracking
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  mysql_data: